name: zdr-triage CI

on:
  push:
    branches: [main]
    paths:
      - 'zdr-triage/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'zdr-triage/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: zdr-triage
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake ninja-build

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
